name: Signed Windows package

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vocalsieve-windows-package
  cancel-in-progress: false

jobs:
  package:
    runs-on: [self-hosted, Windows, X64, vocalsieve-gpu]
    timeout-minutes: 90
    env:
      WINDOWS_SIGNING_PFX_B64: ${{ secrets.WINDOWS_SIGNING_PFX_B64 }}
      WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m pip install ".[tui,dev]"
      - name: Build and sign portable package
        shell: powershell
        run: .\scripts\build_windows_portable.ps1 -Python "${{ env.pythonLocation }}/python.exe" -FfmpegPath "${{ vars.VOCALSIEVE_FFMPEG_PATH }}" -FfmpegLicensePath "${{ vars.VOCALSIEVE_FFMPEG_LICENSE_PATH }}" -RequireSignature
      - name: CUDA smoke test from frozen app
        run: .\dist\windows\VocalSieve\VocalSieve.exe doctor --deep --device cuda --model tiny
      - name: Fetch corresponding source materials
        shell: powershell
        run: .\scripts\fetch_ffmpeg_sources.ps1
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist/windows/VocalSieve
          format: spdx-json
          output-file: dist/windows/VocalSieve-Windows-x64.spdx.json
      - name: Checksums
        shell: powershell
        run: Get-ChildItem dist/windows -File -Recurse | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path.Substring((Resolve-Path '.').Path.Length + 1).Replace('\','/'))" } | Set-Content dist/windows/SHA256SUMS-windows.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signed-windows-package
          path: |
            dist/windows/VocalSieve-Windows-x64.zip
            dist/windows/VocalSieve-Windows-x64.spdx.json
            dist/windows/SHA256SUMS-windows.txt
            dist/sources/*
          retention-days: 14

name: GPU release gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vocalsieve-gpu-gate
  cancel-in-progress: false

jobs:
  windows-and-docker:
    runs-on: [self-hosted, Windows, X64, vocalsieve-gpu]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m pip install ".[tui,api]"
      - name: Windows native CUDA inference
        run: vocalsieve doctor --deep --device cuda --model tiny
      - name: Ensure Docker Desktop is ready
        shell: powershell
        run: |
          $deadline = (Get-Date).AddMinutes(5)
          do {
            docker info *> $null
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Start-Sleep -Seconds 5
          } while ((Get-Date) -lt $deadline)
          throw "Docker Desktop did not become ready"
      - name: Build Linux GPU image
        shell: powershell
        run: |
          $base = "${{ vars.VOCALSIEVE_GPU_BASE }}"
          if ($base) {
            docker build --build-arg "GPU_BASE=$base" --target gpu -t vocalsieve:gpu-test .
          } else {
            docker build --target gpu -t vocalsieve:gpu-test .
          }
          if ($LASTEXITCODE -ne 0) { throw "GPU image build failed with exit code $LASTEXITCODE" }
      - name: Linux container CUDA inference
        run: docker run --rm --gpus all vocalsieve:gpu-test doctor --deep --device cuda --model tiny

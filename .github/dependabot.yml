version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule: {interval: weekly}
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]
  - package-ecosystem: npm
    directory: /web
    schedule: {interval: weekly}
    open-pull-requests-limit: 5
    groups:
      web-minor-patch:
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule: {interval: weekly}
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types: [minor, patch]
  - package-ecosystem: docker
    directory: /
    schedule: {interval: weekly}
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        update-types: [minor, patch]
